name: Daily Subscription Check

on:
  schedule:
    - cron: "15 3 * * *" # 09:00 Asia/Kathmandu
    - cron: "15 9 * * *" # 15:00 Asia/Kathmandu
  workflow_dispatch:
    inputs:
      mode:
        description: "check (normal) or test (send a test message)"
        required: true
        default: "check"

jobs:
  check-subscriptions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run subscription check
        run: node check-expiry.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
