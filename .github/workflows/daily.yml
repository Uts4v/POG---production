name: Daily Subscription Check

on:
  schedule:
    - cron: "15 3 * * *"  # 09:00 Asia/Kathmandu (UTC 03:15)
    - cron: "15 9 * * *"  # 15:00 Asia/Kathmandu (UTC 09:15)
  workflow_dispatch:
    inputs:
      mode:
        description: "check (normal) or test (send a test message)"
        required: true
        default: "check"

jobs:
  check-subscriptions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ✅ Sanity test: proves BOT_TOKEN + CHAT_ID work in GitHub Actions
      # This step runs for both schedule + manual runs (check/test)
      - name: Test Telegram connectivity
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=✅ Telegram test from GitHub Actions: ${GITHUB_REPOSITORY} (${GITHUB_RUN_ID})" \
            | tee /tmp/telegram_response.json
          cat /tmp/telegram_response.json
          # fail workflow if Telegram says ok=false
          if grep -q '"ok":false' /tmp/telegram_response.json; then
            echo "Telegram API returned ok=false"
            exit 1
          fi
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Run subscription check
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'test' }}
        run: node check-expiry.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Send test message
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test' }}
        run: node manual-telegram.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
