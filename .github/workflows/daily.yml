name: Daily Subscription Check
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'check (normal) or test (send a test message)'
        required: true
        default: 'check'

jobs:
  check-subscriptions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run subscription check
        if: ${{ github.event.inputs.mode != 'test' }}
        run: node check-expiry.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Send test message
        if: ${{ github.event.inputs.mode == 'test' }}
        run: node manual-telegram.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
