name: Deploy Firebase Functions on merge

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-functions-merge.yml"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NTE_CLOCKIN }}' > "$HOME/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy Functions
        run: firebase deploy --only functions --project nte-clockin --non-interactive
