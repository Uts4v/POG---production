name: Deploy Firebase Functions on merge

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-functions-merge.yml"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 20)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            functions/package-lock.json
            package-lock.json

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      # 👇 PASTE LINT STEP HERE
      - name: Lint Functions
        run: npm run lint --prefix functions

      - name: Deploy Functions
        run: npx -y firebase-tools@latest deploy --only functions --project proof-of-grind --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROOF_OF_GRIND }}
